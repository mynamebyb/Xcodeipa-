name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build iOS App
        run: |
          echo "Compiling..."
          
          cat > hello.c << 'EOF'
          #include <stdio.h>
          int main() { printf("Hello World\n"); return 0; }
          EOF
          
          mkdir -p Payload/TestApp.app
          echo "APPL????" > Payload/TestApp.app/PkgInfo
          
          cat > Payload/TestApp.app/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleDisplayName</key><string>测试应用</string>
          <key>CFBundleIdentifier</key><string>com.test.app</string>
          <key>MinimumOSVersion</key><string>14.0</string>
          </dict></plist>
          PLIST
          
          zip -r TestApp.ipa Payload/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Test‑IPA
          path: TestApp.ipa
